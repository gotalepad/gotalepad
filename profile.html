<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Gotalepad</title>

  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="wp-navbar">
  <div class="wp-left">
    <a href="./index.html" class="wp-logo">Gotalepad</a>
  </div>

  <div class="wp-right">
    <a href="./index.html" class="wp-menu">Beranda</a>
    <a href="./write.html" class="wp-menu">Tulis</a>
    <a href="./library.html" class="wp-menu">Library</a>
    <button id="logoutBtn" class="secondary-btn">Keluar</button>
  </div>
</header>

<main class="profile-page">

  <section class="profile-header">
    <div class="profile-cover"></div>

    <div class="profile-top">
      <img
        id="profileAvatar"
        src="https://i.pravatar.cc/300"
        class="profile-avatar"
        alt="Avatar"
      >

      <div class="profile-info">
        <h1 id="profileUsername">Loading...</h1>
        <p id="profileBio">Penulis di Gotalepad</p>

        <div class="profile-stats">
          <div>
            <strong id="storyCount">0</strong>
            <span>Karya</span>
          </div>

          <div>
            <strong id="libraryCount">0</strong>
            <span>Library</span>
          </div>

          <div>
            <strong>0</strong>
            <span>Pengikut</span>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="profile-tabs">
    <button class="tab-btn active">Karya</button>
    <button class="tab-btn">Daftar Bacaan</button>
    <button class="tab-btn">Tentang</button>
  </section>

  <section class="profile-stories">
    <div class="section-header">
      <h2>Cerita Saya</h2>

      <a href="./write.html" class="write-story-btn">
        + Tulis Cerita
      </a>
    </div>

    <div id="profileStories" class="story-grid">
      Loading...
    </div>
  </section>

</main>

<script type="module">
import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged,
  signOut
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  getDoc,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const usernameEl = document.getElementById("profileUsername");
const bioEl = document.getElementById("profileBio");
const avatarEl = document.getElementById("profileAvatar");
const storyCountEl = document.getElementById("storyCount");
const libraryCountEl = document.getElementById("libraryCount");
const storiesContainer = document.getElementById("profileStories");
const logoutBtn = document.getElementById("logoutBtn");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "./login.html";
    return;
  }

  loadProfile(user);
  loadStories(user.uid);
  loadLibraryCount(user.uid);
});

async function loadProfile(user) {
  try {
    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (snap.exists()) {
      const data = snap.data();

      usernameEl.innerText = data.username || "Gotalepad Writer";
      bioEl.innerText = data.bio || "Penulis di Gotalepad";

      if (data.avatar) {
        avatarEl.src = data.avatar;
      }
    } else {
      usernameEl.innerText = user.email;
      bioEl.innerText = "Penulis di Gotalepad";
    }

  } catch (err) {
    console.error(err);
    usernameEl.innerText = "Gagal memuat profil";
  }
}

async function loadStories(uid) {
  storiesContainer.innerHTML = "Loading...";

  try {
    const q = query(
      collection(db, "stories"),
      where("uid", "==", uid)
    );

    const snapshot = await getDocs(q);

    storyCountEl.innerText = snapshot.size;
    storiesContainer.innerHTML = "";

    if (snapshot.empty) {
      storiesContainer.innerHTML = `
        <p class="empty-text">Belum ada cerita.</p>
      `;
      return;
    }

    snapshot.forEach((docItem) => {
      const story = docItem.data();

      storiesContainer.innerHTML += `
        <a href="./story.html?id=${docItem.id}" class="story-link">
          <div class="wp-story-card">
            <img src="${story.cover || story.coverUrl || "https://via.placeholder.com/300x450?text=No+Cover"}" alt="Cover">

            <div class="wp-story-info">
              <h3>${story.title || "Tanpa Judul"}</h3>
              <p>${story.author || story.email || "Penulis"}</p>

              <div class="story-tags">
                <span>${story.category || "Novel"}</span>
              </div>

              <div class="story-meta">
                <span>👁 ${story.views || 0}</span>
                <span>⭐ ${story.votes || 0}</span>
              </div>
            </div>
          </div>
        </a>
      `;
    });

  } catch (err) {
    console.error(err);
    storiesContainer.innerHTML = "Gagal memuat cerita.";
  }
}

async function loadLibraryCount(uid) {
  try {
    const snapshot = await getDocs(
      collection(db, "users", uid, "library")
    );

    libraryCountEl.innerText = snapshot.size;

  } catch (err) {
    console.error(err);
    libraryCountEl.innerText = "0";
  }
}

logoutBtn.onclick = async () => {
  await signOut(auth);
  window.location.href = "./login.html";
};
</script>

</body>
</html>
