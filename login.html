<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Gotalepad</title>

  <link rel="stylesheet" href="./style.css">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:Arial, Helvetica, sans-serif;
      background:#fff;
      color:#111;
      min-height:100vh;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 40px;
      border-bottom:1px solid #eee;
      background:#fff;
    }

    .logo{
      font-size:42px;
      font-weight:bold;
      color:#ff5000;
    }

    header a{
      text-decoration:none;
      color:#111;
      font-weight:bold;
    }

    .container{
      display:flex;
      min-height:calc(100vh - 85px);
    }

    .left{
      flex:1;
      background:linear-gradient(135deg,#ff5000,#ff6b81);
      color:#fff;
      padding:80px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .left h1{
      font-size:70px;
      line-height:1.1;
      margin-bottom:25px;
    }

    .left p{
      font-size:22px;
      line-height:1.7;
      opacity:.95;
    }

    .features{
      margin-top:40px;
    }

    .features div{
      margin-bottom:18px;
      font-size:20px;
    }

    .right{
      flex:1;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px;
      background:#fff;
    }

    .form-box{
      width:100%;
      max-width:450px;
    }

    .form-box h2{
      font-size:58px;
      margin-bottom:10px;
    }

    .form-box p{
      color:#666;
      margin-bottom:35px;
      font-size:18px;
    }

    .input-group{
      margin-bottom:25px;
    }

    .input-group label{
      display:block;
      margin-bottom:10px;
      font-weight:bold;
    }

    .input-group input{
      width:100%;
      padding:18px;
      border:1px solid #ddd;
      border-radius:12px;
      font-size:17px;
      outline:none;
    }

    .input-group input:focus{
      border-color:#ff5000;
    }

    .login-btn{
      width:100%;
      padding:18px;
      border:none;
      background:#ff5000;
      color:#fff;
      border-radius:12px;
      font-size:20px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
    }

    .login-btn:hover{
      background:#e64900;
    }

    .bottom-text{
      text-align:center;
      margin-top:25px;
      color:#666;
      font-size:16px;
    }

    .bottom-text a{
      color:#ff5000;
      text-decoration:none;
      font-weight:bold;
    }

    @media(max-width:900px){
      .container{
        flex-direction:column;
      }

      .left{
        padding:50px 30px;
      }

      .left h1{
        font-size:48px;
      }

      .form-box h2{
        font-size:42px;
      }

      header{
        padding:20px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Gotalepad</div>
  <a href="./register.html">Daftar</a>
</header>

<div class="container">

  <div class="left">
    <h1>Masuk ke Gotalepad</h1>

    <p>
      Lanjutkan membaca cerita favoritmu,
      tulis novelmu, dan bangun komunitas pembacamu.
    </p>

    <div class="features">
      <div>📚 Lanjutkan bacaanmu</div>
      <div>✍️ Kelola ceritamu</div>
      <div>⚡ Nikmati fitur Premium</div>
    </div>
  </div>

  <div class="right">
    <div class="form-box">
      <h2>Login</h2>

      <p>Masuk untuk melanjutkan</p>

      <form id="loginForm">
        <div class="input-group">
          <label>Email</label>
          <input
            type="email"
            id="email"
            placeholder="Masukkan email"
            required
          >
        </div>

        <div class="input-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Masukkan password"
            required
          >
        </div>

        <button type="submit" class="login-btn">
          Login
        </button>
      </form>

      <div class="bottom-text">
        Belum punya akun?
        <a href="./register.html">Daftar</a>
      </div>
    </div>
  </div>

</div>

<script type="module">
import { auth } from "./firebase.js";

import {
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const form =
document.getElementById("loginForm");

form.addEventListener("submit",
async (e)=>{

  e.preventDefault();

  const email =
  document.getElementById("email").value;

  const password =
  document.getElementById("password").value;

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert("Login berhasil!");

    window.location.href =
    "./index.html";

  }catch(error){

    alert(error.message);

    console.error(error);

  }

});
</script>

</body>
</html>
