<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Login - Gotalepad</title>

  <link rel="stylesheet"
  href="./style.css">

</head>

<body class="auth-body">

<!-- NAVBAR -->

<header class="wp-navbar">

  <div class="wp-left">

    <a href="./index.html"
    class="wp-logo">

      Gotalepad

    </a>

  </div>

  <div class="wp-right">

    <a href="./register.html"
    class="wp-menu">

      Daftar

    </a>

  </div>

</header>

<!-- AUTH -->

<main class="auth-page">

  <!-- LEFT -->

  <section class="auth-left">

    <div class="auth-left-content">

      <h1>
        Selamat Datang
        di Gotalepad
      </h1>

      <p>
        Masuk dan lanjutkan
        membaca cerita favoritmu
        seperti di Wattpad.
      </p>

      <div class="auth-features">

        <div class="feature-item">
          📚
          <span>
            Baca jutaan cerita
          </span>
        </div>

        <div class="feature-item">
          ✍️
          <span>
            Tulis novelmu sendiri
          </span>
        </div>

        <div class="feature-item">
          ⚡
          <span>
            Nikmati fitur Premium
          </span>
        </div>

      </div>

    </div>

  </section>

  <!-- RIGHT -->

  <section class="auth-right">

    <div class="auth-card">

      <h2>
        Login
      </h2>

      <p class="auth-subtitle">
        Masuk untuk melanjutkan
      </p>

      <!-- EMAIL -->

      <div class="input-group">

        <label>
          Email
        </label>

        <input
        type="email"
        id="email"
        placeholder="Masukkan email">

      </div>

      <!-- PASSWORD -->

      <div class="input-group">

        <label>
          Password
        </label>

        <input
        type="password"
        id="password"
        placeholder="Masukkan password">

      </div>

      <!-- BUTTON -->

      <button
      id="loginBtn"
      class="auth-btn">

        Login

      </button>

      <!-- SWITCH -->

      <p class="switch-auth">

        Belum punya akun?

        <a href="./register.html">

          Daftar

        </a>

      </p>

    </div>

  </section>

</main>

<!-- SCRIPT -->

<script type="module">

import { auth }
from "./js/firebase.js";

import {

  signInWithEmailAndPassword

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn =
document.getElementById(
"loginBtn"
);

loginBtn.onclick =
async ()=>{

  const email =
  document.getElementById(
  "email"
  ).value.trim();

  const password =
  document.getElementById(
  "password"
  ).value.trim();

  if(
    !email ||
    !password
  ){

    alert(
      "Lengkapi semua data!"
    );

    return;

  }

  loginBtn.disabled = true;

  loginBtn.innerText =
  "Masuk...";

  try{

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    alert(
      "Login berhasil!"
    );

    window.location.href =
    "./index.html";

  }catch(err){

    console.error(err);

    if(
      err.code ===
      "auth/user-not-found"
    ){

      alert(
        "User tidak ditemukan."
      );

    }else if(

      err.code ===
      "auth/wrong-password"

    ){

      alert(
        "Password salah."
      );

    }else if(

      err.code ===
      "auth/invalid-credential"

    ){

      alert(
        "Email atau password salah."
      );

    }else{

      alert(err.message);

    }

    loginBtn.disabled = false;

    loginBtn.innerText =
    "Login";

  }

};

</script>

</body>
</html>
