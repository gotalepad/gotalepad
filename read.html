<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baca Chapter - Gotalepad</title>

  <link rel="stylesheet" href="./style.css">

  <style>
    body{
      margin:0;
      font-family:Georgia, "Times New Roman", serif;
      background:#f7f7f7;
      color:#222;
    }

    header{
      background:#fff;
      border-bottom:1px solid #eee;
      padding:18px 40px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      position:sticky;
      top:0;
      z-index:100;
    }

    .logo{
      font-size:36px;
      font-weight:bold;
      color:#ff5000;
      font-family:Arial, Helvetica, sans-serif;
    }

    nav{
      display:flex;
      gap:18px;
      align-items:center;
      font-family:Arial, Helvetica, sans-serif;
    }

    nav a,
    nav button{
      text-decoration:none;
      color:#111;
      background:none;
      border:none;
      font-weight:600;
      cursor:pointer;
      font-size:15px;
    }

    .reader{
      max-width:850px;
      margin:50px auto;
      background:#fff;
      padding:60px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,.08);
    }

    .story-name{
      color:#ff5000;
      font-family:Arial, Helvetica, sans-serif;
      font-weight:bold;
      margin-bottom:10px;
    }

    .chapter-title{
      font-size:52px;
      line-height:1.15;
      margin-bottom:12px;
    }

    .author{
      color:#777;
      margin-bottom:45px;
      font-family:Arial, Helvetica, sans-serif;
    }

    .content{
      font-size:22px;
      line-height:2.1;
      white-space:pre-line;
    }

    .actions{
      margin-top:50px;
      display:flex;
      justify-content:space-between;
      gap:15px;
      font-family:Arial, Helvetica, sans-serif;
    }

    .actions button{
      padding:14px 22px;
      border:none;
      border-radius:12px;
      background:#ff5000;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .actions button:disabled{
      background:#ccc;
      cursor:not-allowed;
    }

    .comment-box{
      max-width:850px;
      margin:30px auto 80px;
      background:#fff;
      padding:40px;
      border-radius:20px;
      box-shadow:0 5px 20px rgba(0,0,0,.08);
      font-family:Arial, Helvetica, sans-serif;
    }

    .comment-box h2{
      margin-bottom:20px;
    }

    .comment-box textarea{
      width:100%;
      min-height:120px;
      padding:15px;
      border:1px solid #ddd;
      border-radius:12px;
      resize:vertical;
      font-size:16px;
      outline:none;
    }

    .comment-box button{
      margin-top:15px;
      padding:12px 22px;
      border:none;
      border-radius:12px;
      background:#ff5000;
      color:white;
      font-weight:bold;
      cursor:pointer;
    }

    .comment-item{
      margin-top:20px;
      padding:18px;
      background:#f7f7f7;
      border-radius:12px;
    }

    .dark{
      background:#111;
      color:#eee;
    }

    .dark header,
    .dark .reader,
    .dark .comment-box{
      background:#1c1c1c;
      color:#eee;
    }

    .dark .comment-item{
      background:#2a2a2a;
    }

    @media(max-width:900px){
      header{
        padding:18px 20px;
      }

      .reader{
        margin:25px 15px;
        padding:30px;
      }

      .chapter-title{
        font-size:36px;
      }

      .content{
        font-size:19px;
      }

      .comment-box{
        margin:25px 15px 60px;
        padding:25px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Gotalepad</div>

  <nav>
    <a id="backToStory" href="./story.html">Detail Cerita</a>
    <button id="fontMinus">A-</button>
    <button id="fontPlus">A+</button>
    <button id="darkToggle">Mode Gelap</button>
  </nav>
</header>

<main class="reader">

  <div class="story-name" id="storyTitle">
    Loading...
  </div>

  <h1 class="chapter-title" id="chapterTitle">
    Loading...
  </h1>

  <div class="author" id="storyAuthor">
    Penulis
  </div>

  <div class="content" id="chapterContent">
    Memuat chapter...
  </div>

  <div class="actions">
    <button id="prevBtn">
      ← Sebelumnya
    </button>

    <button id="voteBtn">
      ⭐ Vote <span id="voteCount">0</span>
    </button>

    <button id="nextBtn">
      Berikutnya →
    </button>
  </div>

</main>

<section class="comment-box">
  <h2>Komentar</h2>

  <textarea
    id="commentInput"
    placeholder="Tulis komentar..."></textarea>

  <button id="sendCommentBtn">
    Kirim Komentar
  </button>

  <div id="commentList"></div>
</section>

<script type="module">
import { auth, db } from "./firebase.js";

import {
  doc,
  getDoc,
  collection,
  getDocs,
  query,
  orderBy,
  setDoc,
  deleteDoc,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params =
new URLSearchParams(window.location.search);

const storyId =
params.get("story") || params.get("storyId") || params.get("id");

const chapterId =
params.get("chapter") || params.get("chapterId");

const storyTitle =
document.getElementById("storyTitle");

const chapterTitle =
document.getElementById("chapterTitle");

const storyAuthor =
document.getElementById("storyAuthor");

const chapterContent =
document.getElementById("chapterContent");

const backToStory =
document.getElementById("backToStory");

const prevBtn =
document.getElementById("prevBtn");

const nextBtn =
document.getElementById("nextBtn");

const voteBtn =
document.getElementById("voteBtn");

const voteCount =
document.getElementById("voteCount");

const commentInput =
document.getElementById("commentInput");

const sendCommentBtn =
document.getElementById("sendCommentBtn");

const commentList =
document.getElementById("commentList");

const fontPlus =
document.getElementById("fontPlus");

const fontMinus =
document.getElementById("fontMinus");

const darkToggle =
document.getElementById("darkToggle");

let currentUser = null;
let chapters = [];
let currentIndex = -1;
let fontSize = 22;

onAuthStateChanged(auth,(user)=>{
  currentUser = user;
});

if(!storyId || !chapterId){
  chapterTitle.innerText = "Chapter tidak ditemukan";
  chapterContent.innerText = "URL chapter tidak valid.";
}else{
  backToStory.href = "./story.html?id=" + storyId;
  loadReader();
  loadVotes();
  loadComments();
}

async function loadReader(){

  try{

    const storySnap =
    await getDoc(
      doc(db,"stories",storyId)
    );

    if(!storySnap.exists()){
      chapterTitle.innerText =
      "Cerita tidak ditemukan";
      chapterContent.innerText = "";
      return;
    }

    const story =
    storySnap.data();

    storyTitle.innerText =
    story.title || "Tanpa Judul";

    storyAuthor.innerText =
    "oleh " + (story.author || story.email || "Penulis");

    const chaptersRef =
    collection(
      db,
      "stories",
      storyId,
      "chapters"
    );

    const q =
    query(
      chaptersRef,
      orderBy("createdAt","asc")
    );

    const snapshot =
    await getDocs(q);

    chapters = [];

    snapshot.forEach((docItem)=>{
      chapters.push({
        id:docItem.id,
        ...docItem.data()
      });
    });

    currentIndex =
    chapters.findIndex(
      chapter => chapter.id === chapterId
    );

    if(currentIndex === -1){
      chapterTitle.innerText =
      "Chapter tidak ditemukan";
      chapterContent.innerText = "";
      return;
    }

    renderChapter(
      chapters[currentIndex]
    );

    updateNavigation();

  }catch(error){

    console.error(error);

    chapterTitle.innerText =
    "Gagal memuat chapter";

    chapterContent.innerText =
    error.message;

  }

}

function renderChapter(chapter){

  chapterTitle.innerText =
  chapter.title || "Tanpa Judul";

  chapterContent.innerText =
  chapter.content || "Belum ada isi chapter.";

}

function updateNavigation(){

  prevBtn.disabled =
  currentIndex <= 0;

  nextBtn.disabled =
  currentIndex >= chapters.length - 1;

  prevBtn.onclick = ()=>{

    if(currentIndex > 0){

      const prev =
      chapters[currentIndex - 1];

      window.location.href =
      "./read.html?story=" +
      storyId +
      "&chapter=" +
      prev.id;

    }

  };

  nextBtn.onclick = ()=>{

    if(currentIndex < chapters.length - 1){

      const next =
      chapters[currentIndex + 1];

      window.location.href =
      "./read.html?story=" +
      storyId +
      "&chapter=" +
      next.id;

    }

  };

}

async function loadVotes(){

  try{

    const snapshot =
    await getDocs(
      collection(
        db,
        "stories",
        storyId,
        "chapters",
        chapterId,
        "votes"
      )
    );

    voteCount.innerText =
    snapshot.size;

  }catch(error){
    console.error(error);
  }

}

voteBtn.onclick =
async ()=>{

  if(!currentUser){
    window.location.href =
    "./login.html";
    return;
  }

  const voteRef =
  doc(
    db,
    "stories",
    storyId,
    "chapters",
    chapterId,
    "votes",
    currentUser.uid
  );

  const voteSnap =
  await getDoc(voteRef);

  if(voteSnap.exists()){
    await deleteDoc(voteRef);
  }else{
    await setDoc(voteRef,{
      uid:currentUser.uid,
      createdAt:new Date()
    });
  }

  loadVotes();

};

sendCommentBtn.onclick =
async ()=>{

  if(!currentUser){
    window.location.href =
    "./login.html";
    return;
  }

  const text =
  commentInput.value.trim();

  if(!text) return;

  await addDoc(
    collection(
      db,
      "stories",
      storyId,
      "chapters",
      chapterId,
      "comments"
    ),
    {
      uid:currentUser.uid,
      email:currentUser.email,
      comment:text,
      createdAt:new Date()
    }
  );

  commentInput.value = "";

  loadComments();

};

async function loadComments(){

  try{

    const q =
    query(
      collection(
        db,
        "stories",
        storyId,
        "chapters",
        chapterId,
        "comments"
      ),
      orderBy("createdAt","desc")
    );

    const snapshot =
    await getDocs(q);

    commentList.innerHTML = "";

    if(snapshot.empty){
      commentList.innerHTML =
      "<p>Belum ada komentar.</p>";
      return;
    }

    snapshot.forEach((docItem)=>{

      const data =
      docItem.data();

      commentList.innerHTML += `
        <div class="comment-item">
          <strong>${data.email || "Pembaca"}</strong>
          <p>${data.comment}</p>
        </div>
      `;

    });

  }catch(error){
    console.error(error);
  }

}

fontPlus.onclick = ()=>{
  fontSize += 2;
  chapterContent.style.fontSize =
  fontSize + "px";
};

fontMinus.onclick = ()=>{
  if(fontSize > 16){
    fontSize -= 2;
    chapterContent.style.fontSize =
    fontSize + "px";
  }
};

darkToggle.onclick = ()=>{
  document.body.classList.toggle("dark");
};
</script>

</body>
</html>
