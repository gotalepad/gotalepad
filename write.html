<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tulis Cerita - Gotalepad</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<header class="wp-navbar">
  <div class="wp-left">
    <a href="./index.html" class="wp-logo">Gotalepad</a>
  </div>

  <div class="wp-right">
    <a href="./index.html" class="wp-menu">Beranda</a>
    <a href="./profile.html" class="wp-menu">Profile</a>
  </div>
</header>

<main class="write-page">
  <section class="write-left">
    <div class="write-card">
      <h1>Tulis Cerita Baru</h1>
      <p class="write-subtitle">Bagikan imajinasimu kepada dunia</p>

      <div class="input-group">
        <label>Judul Cerita</label>
        <input type="text" id="storyTitle" placeholder="Masukkan judul cerita">
      </div>

      <div class="input-group">
        <label>Link Cover</label>
        <input type="text" id="storyCover" placeholder="https://...">
      </div>

      <div class="input-group">
        <label>Deskripsi</label>
        <textarea id="storyDescription" rows="5" placeholder="Tulis deskripsi cerita"></textarea>
      </div>

      <div class="input-group">
        <label>Kategori</label>
        <select id="storyCategory">
          <option>Romance</option>
          <option>Fantasy</option>
          <option>Teen Fiction</option>
          <option>Horror</option>
          <option>Action</option>
          <option>Fanfiction</option>
        </select>
      </div>

      <div class="input-group">
        <label>Judul Chapter 1</label>
        <input type="text" id="chapterTitle" placeholder="Chapter 1">
      </div>

      <div class="input-group">
        <label>Isi Chapter</label>
        <textarea id="chapterContent" class="big-editor" rows="18" placeholder="Mulai menulis..."></textarea>
      </div>

      <button id="publishBtn" class="publish-btn">Publish Cerita</button>
    </div>
  </section>
</main>

<script type="module">
import { auth, db } from "./firebase.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser = null;

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
    return;
  }

  currentUser = user;
});

const publishBtn = document.getElementById("publishBtn");

publishBtn.onclick = async () => {
  const title = document.getElementById("storyTitle").value.trim();
  const cover = document.getElementById("storyCover").value.trim();
  const description = document.getElementById("storyDescription").value.trim();
  const category = document.getElementById("storyCategory").value;
  const chapterTitle = document.getElementById("chapterTitle").value.trim();
  const chapterContent = document.getElementById("chapterContent").value.trim();

  if (!title || !description || !chapterTitle || !chapterContent) {
    alert("Lengkapi semua data!");
    return;
  }

  publishBtn.disabled = true;
  publishBtn.innerText = "Publishing...";

  try {
    const storyRef = await addDoc(collection(db, "stories"), {
      title: title,
      description: description,
      coverUrl: cover || "https://via.placeholder.com/400x600?text=Cover",
      category: category,
      uid: currentUser.uid,
      author: currentUser.email,
      email: currentUser.email,
      views: 0,
      votes: 0,
      createdAt: serverTimestamp()
    });

    await addDoc(collection(db, "stories", storyRef.id, "chapters"), {
      title: chapterTitle,
      content: chapterContent,
      createdAt: serverTimestamp()
    });

    alert("Cerita berhasil dipublish!");
    window.location.href = "./story.html?id=" + storyRef.id;

  } catch (error) {
    console.error(error);
    alert(error.message);

    publishBtn.disabled = false;
    publishBtn.innerText = "Publish Cerita";
  }
};
</script>

</body>
</html>
