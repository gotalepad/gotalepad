<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">

  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Tulis Cerita - Gotalepad</title>

  <link rel="stylesheet"
  href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="wp-navbar">

  <div class="wp-left">

    <a href="index.html"
    class="wp-logo">

      Gotalepad

    </a>

    <a href="#"
    class="wp-menu">

      Jelajahi ▾

    </a>

    <a href="#"
    class="wp-menu">

      Komunitas ▾

    </a>

  </div>

  <div class="wp-search">

    <span>⌕</span>

    <input
    type="text"
    placeholder="Cari">

  </div>

  <div class="wp-right">

    <a href="profile.html"
    class="avatar-btn">

      <img
      src="https://i.pravatar.cc/100">

    </a>

  </div>

</header>

<!-- PAGE -->
<main class="write-page">

  <!-- LEFT -->
  <section class="write-left">

    <div class="write-card">

      <h1>
        Tulis Cerita Baru
      </h1>

      <p class="write-subtitle">
        Bagikan imajinasimu kepada dunia
      </p>

      <!-- TITLE -->
      <div class="input-group">

        <label>
          Judul Cerita
        </label>

        <input
        type="text"
        id="storyTitle"
        placeholder="Masukkan judul cerita">

      </div>

      <!-- COVER -->
      <div class="input-group">

        <label>
          Link Cover
        </label>

        <input
        type="text"
        id="storyCover"
        placeholder="https://i.imgur.com/cover.jpg">

      </div>

      <!-- DESCRIPTION -->
      <div class="input-group">

        <label>
          Deskripsi
        </label>

        <textarea
        id="storyDescription"
        placeholder="Tulis deskripsi cerita..."
        rows="5"></textarea>

      </div>

      <!-- CATEGORY -->
      <div class="input-group">

        <label>
          Kategori
        </label>

        <select id="storyCategory">

          <option>
            Romance
          </option>

          <option>
            Fantasy
          </option>

          <option>
            Horror
          </option>

          <option>
            Teen Fiction
          </option>

          <option>
            Fanfiction
          </option>

          <option>
            Action
          </option>

        </select>

      </div>

      <!-- CHAPTER TITLE -->
      <div class="input-group">

        <label>
          Judul Chapter 1
        </label>

        <input
        type="text"
        id="chapterTitle"
        placeholder="Chapter 1">

      </div>

      <!-- STORY CONTENT -->
      <div class="input-group">

        <label>
          Isi Chapter
        </label>

        <textarea
        id="storyContent"
        class="big-editor"
        placeholder="Mulai menulis..."
        rows="16"></textarea>

      </div>

      <!-- BUTTON -->
      <button
      id="publishBtn"
      class="publish-btn">

        Publish Cerita

      </button>

    </div>

  </section>

  <!-- RIGHT -->
  <aside class="write-right">

    <div class="tips-card">

      <h2>
        Tips Penulis
      </h2>

      <ul>

        <li>
          Gunakan judul menarik
        </li>

        <li>
          Tambahkan cover yang bagus
        </li>

        <li>
          Buat chapter pendek agar nyaman dibaca
        </li>

        <li>
          Konsisten update cerita
        </li>

      </ul>

    </div>

    <div class="preview-card">

      <h2>
        Preview
      </h2>

      <img
      id="previewCover"
      src="https://via.placeholder.com/300x450?text=Cover">

      <h3 id="previewTitle">
        Judul Cerita
      </h3>

      <p id="previewDesc">
        Deskripsi cerita...
      </p>

    </div>

  </aside>

</main>

<script type="module">

import { auth, db }
from "./js/firebase.js";

import {
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  collection,
  addDoc,
  serverTimestamp
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

let currentUser = null;

/* =========================
   AUTH
========================= */

onAuthStateChanged(auth,
(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

currentUser = user;

});

/* =========================
   PREVIEW
========================= */

const titleInput =
document.getElementById(
"storyTitle"
);

const coverInput =
document.getElementById(
"storyCover"
);

const descInput =
document.getElementById(
"storyDescription"
);

titleInput.oninput = ()=>{

document.getElementById(
"previewTitle"
).innerText =
titleInput.value || "Judul Cerita";

};

coverInput.oninput = ()=>{

document.getElementById(
"previewCover"
).src =
coverInput.value ||
"https://via.placeholder.com/300x450?text=Cover";

};

descInput.oninput = ()=>{

document.getElementById(
"previewDesc"
).innerText =
descInput.value || "Deskripsi cerita...";

};

/* =========================
   PUBLISH STORY
========================= */

document
.getElementById("publishBtn")
.onclick = async ()=>{

const title =
titleInput.value;

const cover =
coverInput.value;

const description =
descInput.value;

const category =
document.getElementById(
"storyCategory"
).value;

const chapterTitle =
document.getElementById(
"chapterTitle"
).value;

const content =
document.getElementById(
"storyContent"
).value;

if(
!title ||
!chapterTitle ||
!content
){

alert(
"Lengkapi semua data!"
);

return;

}

try{

/* =========================
   CREATE STORY
========================= */

const storyRef =
await addDoc(
collection(db,"stories"),
{

title:title,

cover:
cover ||
"https://via.placeholder.com/300x450?text=No+Cover",

description:description,

category:category,

author:
currentUser.email,

uid:
currentUser.uid,

createdAt:
serverTimestamp()

}
);

/* =========================
   CREATE CHAPTER
========================= */

await addDoc(
collection(db,"chapters"),
{

storyId:
storyRef.id,

title:
chapterTitle,

content:
content,

chapterNumber:1,

createdAt:
serverTimestamp()

}
);

alert(
"Cerita berhasil dipublish!"
);

window.location.href =
"story.html?id=" +
storyRef.id;

}catch(err){

console.error(err);

alert(err.message);

}

};

</script>

</body>
</html>
