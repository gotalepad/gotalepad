<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Write - GoTalePad</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<header class="header">
  <div class="logo">GoTalePad</div>

  <nav class="nav">
    <a href="index.html">Home</a>
    <a href="library.html">Library</a>
    <a href="write.html">Write</a>
    <a href="profile.html">Profile</a>
  </nav>

  <div class="auth-buttons">
    <a href="profile.html" class="login-btn">Profile</a>
  </div>
</header>

<section class="form-page">

  <div class="form-card">

    <h1>Buat Cerita Baru</h1>
    <p>Mulai tulis cerita kamu dan bagikan ke pembaca.</p>

    <input type="text" id="title" placeholder="Judul cerita">

    <input type="text" id="genre" placeholder="Genre, contoh: Romance, Fantasy, Horror">

    <input type="text" id="cover" placeholder="URL cover gambar">

    <textarea id="description" placeholder="Deskripsi cerita"></textarea>

    <button onclick="createStory()">
      Buat Cerita
    </button>

    <p id="message"></p>

  </div>

</section>

<footer class="footer">
  <p>© 2026 GoTalePad. All rights reserved.</p>
</footer>

<script src="firebase.js"></script>

<script>
let currentUser = null;

auth.onAuthStateChanged(function(user) {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = user;
});

async function createStory() {
  const title = document.getElementById("title").value.trim();
  const genre = document.getElementById("genre").value.trim();
  const cover = document.getElementById("cover").value.trim();
  const description = document.getElementById("description").value.trim();
  const message = document.getElementById("message");

  if (!currentUser) {
    message.style.color = "red";
    message.innerHTML = "Kamu harus login dulu.";
    return;
  }

  if (title === "" || genre === "" || description === "") {
    message.style.color = "red";
    message.innerHTML = "Judul, genre, dan deskripsi wajib diisi.";
    return;
  }

  try {
    const docRef = await db.collection("stories").add({
      title: title,
      genre: genre,
      cover: cover || "https://picsum.photos/300/400",
      description: description,
      authorId: currentUser.uid,
      authorEmail: currentUser.email,
      views: 0,
      likes: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    message.style.color = "green";
    message.innerHTML = "Cerita berhasil dibuat!";

    setTimeout(() => {
      window.location.href = "add-chapter.html?id=" + docRef.id;
    }, 1000);

  } catch (error) {
    message.style.color = "red";
    message.innerHTML = error.message;
  }
}
</script>

</body>
</html>
