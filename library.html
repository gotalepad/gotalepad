<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Library - Gotalepad</title>

<link rel="stylesheet"
href="./style.css">

</head>

<body>

<!-- NAVBAR -->

<header class="wp-navbar">

<div class="wp-left">

<a href="./index.html"
class="wp-logo">

Gotalepad

</a>

<a href="#"
class="wp-menu">

Jelajahi ▾

</a>

<a href="#"
class="wp-menu">

Komunitas ▾

</a>

</div>

<div class="wp-search">

<span>
⌕
</span>

<input
type="text"
id="searchInput"
placeholder="Cari di library...">

</div>

<div class="wp-right">

<a href="./write.html"
class="wp-menu">

Tulis ▾

</a>

<a href="#"
class="premium-btn">

⚡ Premium

</a>

<a href="./profile.html"
class="avatar-btn">

<img
src="https://i.pravatar.cc/100">

</a>

</div>

</header>

<!-- PAGE -->

<main class="library-page">

<div class="library-header">

<h1>
Perpustakaan
</h1>

<p>
Semua cerita favoritmu tersimpan di sini
</p>

</div>

<!-- FILTER -->

<div class="library-filter">

<button
class="filter-btn active">

Semua

</button>

<button
class="filter-btn">

Dibaca

</button>

<button
class="filter-btn">

Belum selesai

</button>

<button
class="filter-btn">

Offline

</button>

</div>

<!-- STORIES -->

<div
id="libraryStories"
class="story-grid">

Loading...

</div>

</main>

<!-- SCRIPT -->

<script type="module">

import { auth, db }
from "./js/firebase.js";

import {

onAuthStateChanged

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {

collection,
getDocs,
doc,
getDoc,
deleteDoc

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const libraryContainer =
document.getElementById(
"libraryStories"
);

const searchInput =
document.getElementById(
"searchInput"
);

let allStories = [];

/* =========================
   AUTH
========================= */

onAuthStateChanged(
auth,
(user)=>{

if(!user){

window.location.href =
"./login.html";

return;

}

loadLibrary(user.uid);

});

/* =========================
   LOAD LIBRARY
========================= */

async function loadLibrary(uid){

libraryContainer.innerHTML =
"Loading...";

try{

const snapshot =
await getDocs(

collection(
db,
"users",
uid,
"library"
)

);

allStories = [];

if(snapshot.empty){

libraryContainer.innerHTML = `

<div class="empty-library">

<h2>
Belum ada cerita
</h2>

<p>
Tambahkan cerita ke library
agar muncul di sini.
</p>

</div>

`;

return;

}

/* LOOP */

for(const item of snapshot.docs){

const data = item.data();

const storyRef =
await getDoc(

doc(
db,
"stories",
data.storyId
)

);

if(storyRef.exists()){

allStories.push({

id:storyRef.id,

...storyRef.data()

});

}

}

/* RENDER */

renderStories(allStories);

}catch(err){

console.error(err);

libraryContainer.innerHTML =
"Gagal memuat library.";

}

}

/* =========================
   RENDER
========================= */

function renderStories(stories){

libraryContainer.innerHTML = "";

if(stories.length === 0){

libraryContainer.innerHTML = `

<div class="empty-library">

<h2>
Cerita tidak ditemukan
</h2>

</div>

`;

return;

}

stories.forEach((story)=>{

libraryContainer.innerHTML += `

<div class="library-card">

<a
href="./story.html?id=${story.id}"
class="story-link">

<div class="wp-story-card">

<img
src="${
story.cover ||

'https://images.unsplash.com/photo-1544947950-fa07a98d237f?q=80&w=600'
}"

alt="cover">

<div class="wp-story-info">

<h3>

${story.title || "Tanpa Judul"}

</h3>

<p>

${story.author || "Penulis"}

</p>

<div class="story-tags">

<span>

${story.category || "Novel"}

</span>

<span>

Library

</span>

</div>

<div class="story-meta">

<span>

👁 ${story.views || 0}

</span>

<span>

⭐ ${story.votes || 0}

</span>

</div>

</div>

</div>

</a>

<button
class="remove-btn"
data-id="${story.id}">

Hapus

</button>

</div>

`;

});

/* REMOVE */

document.querySelectorAll(
".remove-btn"
).forEach((btn)=>{

btn.onclick =
async ()=>{

const storyId =
btn.dataset.id;

const user =
auth.currentUser;

if(!user) return;

await deleteDoc(

doc(
db,
"users",
user.uid,
"library",
storyId
)

);

allStories =
allStories.filter(

(story)=>
story.id !== storyId

);

renderStories(allStories);

};

});

}

/* =========================
   SEARCH
========================= */

if(searchInput){

searchInput.addEventListener(
"input",
()=>{

const keyword =
searchInput.value
.toLowerCase();

if(keyword === ""){

renderStories(
allStories
);

return;

}

const filtered =
allStories.filter((story)=>{

return(

(story.title || "")
.toLowerCase()
.includes(keyword)

||

(story.author || "")
.toLowerCase()
.includes(keyword)

||

(story.category || "")
.toLowerCase()
.includes(keyword)

);

});

renderStories(filtered);

});

}

</script>

</body>
</html>
