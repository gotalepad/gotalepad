<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Library - Gotalepad</title>

  <link rel="stylesheet"
  href="style.css">
</head>
<body>

<!-- NAVBAR -->
<header class="wp-navbar">

  <div class="wp-left">

    <a href="index.html"
    class="wp-logo">

      Gotalepad

    </a>

    <a href="#"
    class="wp-menu">

      Jelajahi ▾

    </a>

    <a href="#"
    class="wp-menu">

      Komunitas ▾

    </a>

  </div>

  <div class="wp-search">

    <span>⌕</span>

    <input
    type="text"
    id="searchInput"
    placeholder="Cari cerita">

  </div>

  <div class="wp-right">

    <a href="write.html"
    class="wp-menu">

      Tulis ▾

    </a>

    <a href="profile.html"
    class="avatar-btn">

      <img
      src="https://i.pravatar.cc/100">

    </a>

  </div>

</header>

<!-- PAGE -->
<main class="library-page">

  <!-- TITLE -->
  <section class="library-header">

    <h1>
      Perpustakaan Saya
    </h1>

    <p>
      Semua cerita yang kamu simpan
    </p>

  </section>

  <!-- FILTER -->
  <section class="library-filter">

    <button class="filter-btn active">
      Semua
    </button>

    <button class="filter-btn">
      Dibaca
    </button>

    <button class="filter-btn">
      Belum selesai
    </button>

  </section>

  <!-- STORIES -->
  <section>

    <div
    id="libraryStories"
    class="story-grid">

      Loading...

    </div>

  </section>

</main>

<script type="module">

import { auth, db }
from "./js/firebase.js";

import {
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  collection,
  getDocs,
  doc,
  getDoc
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const container =
document.getElementById(
"libraryStories"
);

const searchInput =
document.getElementById(
"searchInput"
);

let allStories = [];

/* =========================
   AUTH
========================= */

onAuthStateChanged(auth,
async(user)=>{

if(!user){

window.location.href =
"login.html";

return;

}

loadLibrary(user.uid);

});

/* =========================
   LOAD LIBRARY
========================= */

async function loadLibrary(uid){

container.innerHTML =
"Loading...";

allStories = [];

try{

const snapshot =
await getDocs(
collection(
db,
"users",
uid,
"library"
)
);

container.innerHTML = "";

if(snapshot.empty){

container.innerHTML = `

<div class="empty-library">

<h2>
📚
</h2>

<h3>
Library masih kosong
</h3>

<p>
Tambahkan cerita ke library
untuk membacanya nanti.
</p>

<a href="index.html"
class="discover-btn">

Temukan Cerita

</a>

</div>

`;

return;

}

for(const item of snapshot.docs){

const storyId =
item.id;

const storyRef =
doc(
db,
"stories",
storyId
);

const storySnap =
await getDoc(storyRef);

if(storySnap.exists()){

const story =
storySnap.data();

allStories.push({

id:storyId,

...story

});

}

}

renderStories(allStories);

}catch(err){

console.error(err);

container.innerHTML =
"Gagal memuat library.";

}

}

/* =========================
   RENDER STORIES
========================= */

function renderStories(stories){

container.innerHTML = "";

if(stories.length === 0){

container.innerHTML = `

<p class="empty-text">
Cerita tidak ditemukan.
</p>

`;

return;

}

stories.forEach((story)=>{

container.innerHTML += `

<a
href="story.html?id=${story.id}"
class="story-link">

<div class="wp-story-card">

<img
src="${
story.cover ||
'https://via.placeholder.com/300x450?text=No+Cover'
}">

<div class="wp-story-info">

<h3>
${story.title}
</h3>

<p>
${story.author || story.email}
</p>

<div class="story-tags">

<span>
Romance
</span>

<span>
Fantasy
</span>

</div>

<div class="story-meta">

<span>
👁 0
</span>

<span>
⭐ 0
</span>

</div>

</div>

</div>

</a>

`;

});

}

/* =========================
   SEARCH
========================= */

searchInput.addEventListener(
"input",
()=>{

const keyword =
searchInput.value
.toLowerCase();

const filtered =
allStories.filter((story)=>{

return(

story.title
.toLowerCase()
.includes(keyword)

||

(story.author || "")
.toLowerCase()
.includes(keyword)

);

});

renderStories(filtered);

});

</script>

</body>
</html>
