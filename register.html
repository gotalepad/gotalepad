<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar - Gotalepad</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body class="auth-body">

<header class="wp-navbar">
  <div class="wp-left">
    <a href="./index.html" class="wp-logo">Gotalepad</a>
  </div>

  <div class="wp-right">
    <a href="./login.html" class="wp-menu">Login</a>
  </div>
</header>

<main class="auth-page">

  <section class="auth-left">
    <div class="auth-left-content">
      <h1>Mulai Perjalananmu di Gotalepad</h1>
      <p>
        Jadilah penulis berikutnya dan bagikan cerita terbaikmu kepada dunia.
      </p>

      <div class="auth-features">
        <div class="feature-item">✍️ <span>Tulis cerita tanpa batas</span></div>
        <div class="feature-item">📖 <span>Bangun pembaca setiamu</span></div>
        <div class="feature-item">⚡ <span>Akses fitur Premium nanti</span></div>
      </div>
    </div>
  </section>

  <section class="auth-right">
    <div class="auth-card">
      <h2>Buat Akun</h2>
      <p class="auth-subtitle">Daftar untuk mulai membaca dan menulis</p>

      <div class="input-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="Masukkan username">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Masukkan email">
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Minimal 6 karakter">
      </div>

      <button id="registerBtn" class="auth-btn">Daftar</button>

      <p class="switch-auth">
        Sudah punya akun?
        <a href="./login.html">Login</a>
      </p>
    </div>
  </section>

</main>

<script type="module">
import { auth, db } from "./js/firebase.js";

import {
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const registerBtn = document.getElementById("registerBtn");

registerBtn.onclick = async () => {
  const username = document.getElementById("username").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !email || !password) {
    alert("Lengkapi semua data!");
    return;
  }

  if (password.length < 6) {
    alert("Password minimal 6 karakter!");
    return;
  }

  registerBtn.disabled = true;
  registerBtn.innerText = "Mendaftarkan...";

  try {
    const userCredential = await createUserWithEmailAndPassword(
      auth,
      email,
      password
    );

    const user = userCredential.user;

    await setDoc(doc(db, "users", user.uid), {
      username: username,
      email: email,
      bio: "Penulis di Gotalepad",
      avatar: "https://i.pravatar.cc/300",
      isPremium: false,
      createdAt: serverTimestamp()
    });

    alert("Register berhasil!");
    window.location.href = "./index.html";

  } catch (err) {
    console.error(err);

    if (err.code === "auth/email-already-in-use") {
      alert("Email sudah digunakan.");
    } else if (err.code === "auth/invalid-email") {
      alert("Format email salah.");
    } else if (err.code === "auth/weak-password") {
      alert("Password terlalu lemah.");
    } else if (err.code === "permission-denied") {
      alert("Firestore Rules menolak penyimpanan user.");
    } else {
      alert(err.message);
    }

    registerBtn.disabled = false;
    registerBtn.innerText = "Daftar";
  }
};
</script>

</body>
</html>
