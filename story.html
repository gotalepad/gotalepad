<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Cerita - Gotalepad</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>

<header class="wp-navbar">
  <div class="wp-left">
    <a href="./index.html" class="wp-logo">Gotalepad</a>
    <a href="#" class="wp-menu">Jelajahi ▾</a>
    <a href="#" class="wp-menu">Komunitas ▾</a>
  </div>

  <div class="wp-search">
    <span>⌕</span>
    <input type="text" placeholder="Cari">
  </div>

  <div class="wp-right">
    <a href="./write.html" class="wp-menu">Tulis ▾</a>
    <a href="#" class="premium-btn">⚡ Premium</a>
    <a href="./profile.html" class="avatar-btn">
      <img src="https://i.pravatar.cc/100" alt="Profile">
    </a>
  </div>
</header>

<main class="story-detail-page">

  <section class="story-hero-detail">
    <div class="story-cover-box">
      <img id="storyCover" src="https://via.placeholder.com/300x450?text=No+Cover" alt="Cover">
    </div>

    <div class="story-detail-info">
      <h1 id="storyTitle">Loading...</h1>
      <p class="story-author">oleh <span id="storyAuthor">Penulis</span></p>

      <div class="story-stats">
        <div>
          <strong id="readCount">0</strong>
          <span>Dibaca</span>
        </div>

        <div>
          <strong id="voteCount">0</strong>
          <span>Vote</span>
        </div>

        <div>
          <strong id="chapterCount">0</strong>
          <span>Bagian</span>
        </div>
      </div>

      <div class="story-actions">
        <button id="startReadBtn" class="primary-read-btn">Mulai Membaca</button>
        <button id="libraryBtn" class="secondary-btn">＋ Library</button>
        <button id="voteBtn" class="secondary-btn">⭐ Vote</button>
      </div>

      <p id="storyDescription" class="story-description">
        Memuat deskripsi cerita...
      </p>

      <div class="tag-row">
        <span id="storyCategory">Novel</span>
        <span>Gotalepad</span>
        <span>Original</span>
      </div>
    </div>
  </section>

  <section class="chapter-panel">
    <div class="chapter-header">
      <h2>Daftar Bagian</h2>
      <a id="addChapterLink" href="#">+ Tambah Chapter</a>
    </div>

    <div id="chapterList" class="chapter-list">
      Loading chapter...
    </div>
  </section>

</main>

<script type="module">
import { auth, db } from "./js/firebase.js";

import {
  doc,
  getDoc,
  collection,
  getDocs,
  query,
  where,
  orderBy,
  setDoc,
  deleteDoc,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const params = new URLSearchParams(window.location.search);
const storyId = params.get("id");

const storyCover = document.getElementById("storyCover");
const storyTitle = document.getElementById("storyTitle");
const storyAuthor = document.getElementById("storyAuthor");
const storyDescription = document.getElementById("storyDescription");
const storyCategory = document.getElementById("storyCategory");
const chapterList = document.getElementById("chapterList");
const chapterCount = document.getElementById("chapterCount");
const voteCount = document.getElementById("voteCount");
const readCount = document.getElementById("readCount");

const startReadBtn = document.getElementById("startReadBtn");
const addChapterLink = document.getElementById("addChapterLink");
const libraryBtn = document.getElementById("libraryBtn");
const voteBtn = document.getElementById("voteBtn");

let currentUser = null;
let chapters = [];
let storyData = null;

onAuthStateChanged(auth, (user) => {
  currentUser = user;
});

if (!storyId) {
  storyTitle.innerText = "Cerita tidak ditemukan";
  chapterList.innerHTML = "";
} else {
  addChapterLink.href = `./add-chapter.html?id=${storyId}`;
  loadStory();
  loadChapters();
  loadVotes();
}

async function loadStory() {
  try {
    const storyRef = doc(db, "stories", storyId);
    const snap = await getDoc(storyRef);

    if (!snap.exists()) {
      storyTitle.innerText = "Cerita tidak ditemukan";
      return;
    }

    storyData = snap.data();

    storyTitle.innerText = storyData.title || "Tanpa Judul";
    storyAuthor.innerText = storyData.author || storyData.email || "Penulis Gotalepad";
    storyDescription.innerText = storyData.description || "Belum ada deskripsi.";
    storyCover.src = storyData.cover || "https://via.placeholder.com/300x450?text=No+Cover";
    storyCategory.innerText = storyData.category || "Novel";
    readCount.innerText = storyData.views || 0;

  } catch (err) {
    console.error(err);
    storyTitle.innerText = "Gagal memuat cerita";
  }
}

async function loadChapters() {
  try {
    const q = query(
      collection(db, "chapters"),
      where("storyId", "==", storyId),
      orderBy("chapterNumber", "asc")
    );

    const snapshot = await getDocs(q);

    chapters = [];

    snapshot.forEach((docItem) => {
      chapters.push({
        id: docItem.id,
        ...docItem.data()
      });
    });

    chapterCount.innerText = chapters.length;
    chapterList.innerHTML = "";

    if (chapters.length === 0) {
      chapterList.innerHTML = "<p>Belum ada chapter.</p>";
      startReadBtn.disabled = true;
      return;
    }

    startReadBtn.onclick = async () => {
      await updateViews();
      window.location.href =
        `./read.html?storyId=${storyId}&chapterId=${chapters[0].id}`;
    };

    chapters.forEach((chapter) => {
      chapterList.innerHTML += `
        <a class="chapter-item" href="./read.html?storyId=${storyId}&chapterId=${chapter.id}">
          <div>
            <h3>Bagian ${chapter.chapterNumber}: ${chapter.title || "Tanpa Judul"}</h3>
            <p>${chapter.content ? chapter.content.substring(0, 130) + "..." : ""}</p>
          </div>
          <span>›</span>
        </a>
      `;
    });

  } catch (err) {
    console.error(err);
    chapterList.innerHTML = "<p>Gagal memuat chapter.</p>";
  }
}

async function updateViews() {
  try {
    await updateDoc(
      doc(db, "stories", storyId),
      {
        views: increment(1)
      }
    );
  } catch (err) {
    console.error(err);
  }
}

async function loadVotes() {
  try {
    const snapshot = await getDocs(
      collection(db, "stories", storyId, "votes")
    );

    voteCount.innerText = snapshot.size;

  } catch (err) {
    console.error(err);
  }
}

voteBtn.onclick = async () => {
  if (!currentUser) {
    window.location.href = "./login.html";
    return;
  }

  const voteRef = doc(
    db,
    "stories",
    storyId,
    "votes",
    currentUser.uid
  );

  const voteSnap = await getDoc(voteRef);

  if (voteSnap.exists()) {
    await deleteDoc(voteRef);
  } else {
    await setDoc(voteRef, {
      uid: currentUser.uid,
      createdAt: Date.now()
    });
  }

  loadVotes();
};

libraryBtn.onclick = async () => {
  if (!currentUser) {
    window.location.href = "./login.html";
    return;
  }

  await setDoc(
    doc(db, "users", currentUser.uid, "library", storyId),
    {
      storyId: storyId,
      savedAt: Date.now()
    }
  );

  alert("Ditambahkan ke Library!");
};
</script>

</body>
</html>
