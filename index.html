<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GotalePad</title>

  <link rel="stylesheet" href="./style.css">

  <style>
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      background:#fff;
      color:#111;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 40px;
      border-bottom:1px solid #eee;
      background:#fff;
      position:sticky;
      top:0;
      z-index:100;
    }

    .logo{
      font-size:42px;
      font-weight:bold;
      color:#ff5000;
    }

    nav{
      display:flex;
      gap:20px;
      align-items:center;
    }

    nav a{
      text-decoration:none;
      color:#111;
      font-weight:600;
    }

    .btn-login{
      background:#ff5000;
      color:#fff;
      padding:10px 22px;
      border-radius:30px;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:80px 70px;
      background:linear-gradient(135deg,#ff5000,#ff7b7b);
      color:#fff;
    }

    .hero-text{
      max-width:600px;
    }

    .hero-text h1{
      font-size:72px;
      margin-bottom:20px;
      line-height:1.1;
    }

    .hero-text p{
      font-size:22px;
      opacity:.95;
      line-height:1.7;
    }

    .hero-buttons{
      margin-top:35px;
      display:flex;
      gap:15px;
    }

    .hero-buttons a{
      text-decoration:none;
      padding:14px 28px;
      border-radius:30px;
      font-weight:bold;
    }

    .start-btn{
      background:#fff;
      color:#ff5000;
    }

    .read-btn{
      background:rgba(255,255,255,.2);
      color:#fff;
      border:1px solid rgba(255,255,255,.3);
    }

    .section{
      padding:60px 70px;
    }

    .section-title{
      font-size:34px;
      margin-bottom:35px;
      font-weight:bold;
    }

    .stories{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:25px;
    }

    .story-card{
      background:#fff;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,.08);
      transition:.3s;
      cursor:pointer;
    }

    .story-card:hover{
      transform:translateY(-5px);
    }

    .story-cover{
      width:100%;
      height:320px;
      object-fit:cover;
      background:#ddd;
    }

    .story-info{
      padding:18px;
    }

    .story-title{
      font-size:20px;
      font-weight:bold;
      margin-bottom:8px;
    }

    .story-author{
      color:#666;
      font-size:14px;
    }

    footer{
      text-align:center;
      padding:40px;
      color:#777;
      border-top:1px solid #eee;
      margin-top:50px;
    }

    @media(max-width:900px){

      .hero{
        flex-direction:column;
        text-align:center;
      }

      .hero-text h1{
        font-size:48px;
      }

      .hero-buttons{
        justify-content:center;
      }

      header{
        padding:20px;
      }

      .section{
        padding:40px 20px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Gotalepad</div>

  <nav>
    <a href="./login.html">Login</a>
    <a href="./register.html" class="btn-login">Daftar</a>
  </nav>
</header>

<section class="hero">

  <div class="hero-text">
    <h1>Baca & Tulis Cerita Favoritmu</h1>

    <p>
      Platform menulis novel modern seperti Wattpad.
      Tulis cerita, baca jutaan novel,
      dan bangun komunitas pembaca.
    </p>

    <div class="hero-buttons">
      <a href="./register.html" class="start-btn">
        Mulai Menulis
      </a>

      <a href="#stories" class="read-btn">
        Jelajahi Cerita
      </a>
    </div>
  </div>

</section>

<section class="section" id="stories">

  <div class="section-title">
    Cerita Populer
  </div>

  <div class="stories" id="storiesContainer">

  </div>

</section>

<footer>
  © 2026 Gotalepad — Platform cerita modern seperti Wattpad
</footer>

<script type="module" src="./home.js"></script>

</body>
</html>
