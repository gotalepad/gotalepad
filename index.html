<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gotalepad</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>



<!-- NAVBAR -->

<header class="topbar">

<div class="logo">
Gotalepad
</div>



<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Cari cerita...">

</div>



<nav>

<a href="write.html">
Tulis
</a>

<a href="library.html">
Library
</a>

<a href="profile.html">
Profile
</a>

</nav>

</header>



<!-- HERO BANNER -->

<section class="hero-slider">

<div class="hero-content">

<h1>
Lebih banyak kategori,
lebih mudah eksis
</h1>

<p>
Bagikan cerita terbaikmu
di Gotalepad 
</p>

<button>
Mulai Membaca
</button>

</div>

</section>



<!-- TRENDING STORIES -->

<section class="home-section">

<div class="section-header">

<h2>Trending Stories</h2>

</div>

<div
class="story-row"
id="storyContainer">

</div>

</section>



<!-- CATEGORY -->

<section class="home-section">

<div class="section-header">

<h2>Kategori Populer</h2>

</div>

<div class="category-row">

<div class="category-card">
Romance
</div>

<div class="category-card">
Fantasy
</div>

<div class="category-card">
Horror
</div>

<div class="category-card">
Fanfiction
</div>

<div class="category-card">
Teen Fiction
</div>

<div class="category-card">
Action
</div>

</div>

</section>



<!-- CERITA BARU -->

<section class="home-section">

<div class="section-header">

<h2>Cerita Baru</h2>

</div>

<div
class="story-row"
id="newStories">

</div>

</section>





<script type="module">

import { db }
from './js/firebase.js';

import {
collection,
getDocs,
query,
orderBy,
limit
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";



const container =
document.getElementById(
"storyContainer"
);

const newStories =
document.getElementById(
"newStories"
);

const searchInput =
document.getElementById(
"searchInput"
);



let allStories = [];



/* =========================
   RENDER STORIES
========================= */

function renderStories(stories){

container.innerHTML = "";

stories.forEach((story)=>{

container.innerHTML += `

<a
href="story.html?id=${story.id}"
class="story-link">

<div class="modern-story-card">

<img src="${story.cover}">

<div class="modern-story-info">

<h3>${story.title}</h3>

<p>${story.author}</p>

</div>

</div>

</a>

`;

});

}



/* =========================
   LOAD STORIES
========================= */

async function loadStories(){

try{



allStories = [];

container.innerHTML = "";

newStories.innerHTML = "";



const q =
query(
collection(db,"stories"),
orderBy("createdAt","desc"),
limit(12)
);



const querySnapshot =
await getDocs(q);





querySnapshot.forEach((docItem)=>{

const story = {

id:docItem.id,

...docItem.data()

};



allStories.push(story);

});



/* =========================
   TRENDING STORIES
========================= */

renderStories(allStories);



/* =========================
   CERITA BARU
========================= */

allStories.forEach((story)=>{

newStories.innerHTML += `

<a
href="story.html?id=${story.id}"
class="story-link">

<div class="modern-story-card">

<img src="${story.cover}">

<div class="modern-story-info">

<h3>${story.title}</h3>

<p>${story.author}</p>

</div>

</div>

</a>

`;

});



}catch(err){

console.error(err);

alert(err.message);

}

}



/* =========================
   SEARCH REALTIME
========================= */

searchInput.oninput = (e)=>{

const keyword =
e.target.value
.toLowerCase();



const filteredStories =
allStories.filter((story)=>{

return(

story.title
.toLowerCase()
.includes(keyword)

||

story.author
.toLowerCase()
.includes(keyword)

);

});



renderStories(filteredStories);

};



/* =========================
   START
========================= */

loadStories();

</script>

</body>
</html>
